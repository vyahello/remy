name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-noto-color-emoji

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,bot]"

      - name: Lint
        run: ruff check remy tests

      - name: Type check
        run: mypy

      - name: Test
        run: pytest

  # VPS deploy — armed by the repo variable REMY_DEPLOY=enabled
  # (Settings → Secrets and variables → Actions → Variables) plus the
  # VPS_HOST / VPS_USER / VPS_SSH_KEY / VPS_APP_DIR secrets (the app dir
  # is a secret so the server path never appears in the repo or the logs).
  # Until those exist this job is skipped. Server prep: deploy/bootstrap.sh
  # (see docs/DEPLOY.md); a running tokcut box migrates with
  # deploy/migrate-to-remy.sh.
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.REMY_DEPLOY == 'enabled'
    concurrency: deploy            # never two deploys at once
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd "${{ secrets.VPS_APP_DIR }}"
            git fetch origin main
            git reset --hard origin/main
            venv/bin/pip install -q -e ".[bot]"
            # SoundFont instruments for the music generator;
            # --no-deps skips its pyaudio extra (live playback —
            # not needed, and it needs system portaudio to build)
            venv/bin/pip install -q --no-deps tinysoundfont
            # drain: a restart mid-encode kills the take — wait for the
            # bot's .rendering marker to clear (up to ~20 min).
            # NB: plain `[ … ] && break` exits 1 under script_stop/set -e
            # when the marker exists; `if` is strict-mode safe.
            for i in $(seq 1 60); do
              if [ ! -f ~/.remy/work/.rendering ]; then
                break
              fi
              echo "render in progress, waiting ($i/60)…"
              sleep 20
            done
            sudo /usr/bin/systemctl restart remy-bot
            systemctl --no-pager --lines=0 status remy-bot
